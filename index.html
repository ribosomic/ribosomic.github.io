<!DOCTYPE html>
<html>
	<head>
		<script src="global.js"></script>
		<style>
			body{background-color: #202124;}

			html,body,h1,input,select,a,p,pre{font-family:Roboto,arial,sans-serif}
			h1,p,pre{color:#E8EAED}

			a:hover{text-decoration:underline}
			a{color:#8AB4F8;text-decoration:none}

			hr{border-color:#3C4043}

			.special{color:#c58af9}
		</style>
	</head>
	<body>
		<div id="topBar"><p><b class="special">Ribosomic</b>, now with 100% more games!</p></div><hr>

		<h1 id="warning" class="special">Javascript may have been disabled by an admin :(</h1>

		<input type="button" id="togglepopup" value="?" text="Open in popout window"></input>
		<input type="button" id="panic" value="Panic - F4" onclick="Panic(this);"></input>

		<br><hr>

		<script>
			const Warning = document.getElementById("warning")

			const TogglePopup = document.getElementById("togglepopup")
			const PanicButton = document.getElementById("panic")

			const ON = '✔'
			const OFF = '✖'

			function Toggle(button){
				const Value = button.value
				const Text = button.getAttribute('text')
				
				if (Value == Text + ": " + OFF || Value == null || Value == '?' || Value == ''){
					PopupEnabled = true
					TogglePopup.value = Text + ": " + ON
				} else if (Value == Text + ": " + ON){
					PopupEnabled = false
					TogglePopup.value = Text + ": " + OFF
				}
			}

			TogglePopup.addEventListener("click", function(e){
				Toggle(this)
			});

			document.body.addEventListener("keydown", function(e){
				if (e.key != 'F4'){return}

				Panic(PanicButton)
			});
			
			Toggle(TogglePopup)

			Warning.remove()

			for (var Index of Object.keys(Pages)) {
				var link = document.createElement('a');
				var linebreak = document.createElement('br');

				link.innerHTML = Pages[Index].title;
				link.href = 'javascript:void(0);'

				link.setAttribute('index', Index)
				link.addEventListener("click", function(e) {
					LoadPageNoTrace(LoadPage(this.getAttribute('index')).html, false, this.getAttribute('index'))
				});

				link.appendChild(linebreak);

				document.body.appendChild(link);
			}
		</script>
	</body>
</html>
