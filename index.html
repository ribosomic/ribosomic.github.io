<!DOCTYPE html>
<html>
	<head>
		<script src="global.js"></script>
		<style>
			body{background-color: #202124;}
			html,body,h1,input,select,a{font-family:Roboto,arial,sans-serif}

			a:visited{color:#c58af9}
			a:hover{text-decoration:underline}

			a{color:#8AB4F8;text-decoration:none}
		</style>
	</head>
	<body>
		<p id="warning">Javascript may have been disabled by an admin :(</p>
		<script>
			document.getElementById('warning').remove()

			for (var Index of Object.keys(Pages)) {
				var link = document.createElement("a");

				link.innerHTML = Pages[Index].title;
				link.href = 'javascript:void(0);'

				link.onclick = function(){LoadPageNoTrace(LoadPage(Index).html, false, Index)}

				document.body.appendChild(link);
			}
		</script>
	</body>
</html>
